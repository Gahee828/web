                <p>MOUMOU는 이메일을 무단으로 수집하여 사용하지 않습니다.</p>
                <div class="text-cource">
MOUMOU 웹사이트에 게시된 이메일 주소가
전자우편 수집 프로그램이나 그 밖의 기술적 장치를 이용하여
무단으로 수집되는 것을 거부합니다.

이를 위반할 경우, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」 등에 의해
형사처벌을 받을 수 있음을 유의하시기 바랍니다.

MOUMOU는 고객의 개인정보와 소중한 일상을 존중합니다.
원하지 않는 정보로 불편을 드리지 않도록
안전한 온라인 환경을 지켜나가겠습니다.
